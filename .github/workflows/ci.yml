name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck store
        working-directory: apps/store
        run: npx tsc --noEmit

      - name: Typecheck admin-hub
        working-directory: apps/admin-hub
        run: npx tsc --noEmit

      # mongodb-memory-server descarga mongod en el primer run del job
      - name: Tests store
        working-directory: apps/store
        run: npx vitest run

      # _template queda fuera a propósito: es referencia histórica y no compila
      # contra la arquitectura actual.
      - name: Build
        run: npx turbo build --filter=store --filter=admin-hub
